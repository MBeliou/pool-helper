name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (svelte-check)
        run: pnpm check

      - name: Lint (prettier + eslint)
        run: pnpm lint

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      # playwright.config webServer builds + previews; reuseExistingServer is off in CI
      - name: e2e tests
        run: pnpm exec playwright test

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (svelte-check)
        run: pnpm check

      - name: Lint (prettier + eslint)
        run: pnpm lint

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build
    # Note: e2e (playwright) is intentionally omitted until a committed e2e suite
    # exists (production-plan #16). Add a job once specs land under e2e/.
